<!DOCTYPE html>
<html>
    <head>
        <!--meta for the browser to allow for mobile first design-->
        <meta charset="utf-8" />

        <title>Data Collector for AGOL</title>
        <style>
            html,
            body,
            #viewDiv {
                padding: 0;
                margin: 0;
                height: 100%;
                width: 100%;

            h1 {
                background-color: rgb(243, 243, 246);
                font-family: 'Times New Roman', Times, serif;
                font-weight: 300;

        <!--importing the css and libraries for esri.js-->
        <link rel="stylesheet" href="https://js.arcgis.com/4.26/esri/themes/light/main.css" />
        <script src="https://js.arcgis.com/4.26/"></script>
        <!--loading the modules-->
        <script>
            require([ 
                "esri/config", 
                "esri/Map", 
                "esri/views/MapView",
                "esri/Graphic",
                "esri/widgets/Locate",
                "esri/widgets/Search"
                    
            ], (esriConfig, Map, MapView, Graphic, Locate, Search) => {
            
                //adding API Key
                esriConfig.apiKey = "AAPTaBnZ46xkwyP4x51l5xjCrOw..vg5j4v-6rbmLIYpYUVCew1pE6BFTYR8H_HowG-lMBJyFIpbjPldNy_jB3XkEUJO6re92J5Nr8xKO0Qkgkekz8LBOaqM6cMEjxEOcSNjSWq0nl5XCGshkt5DP7Fvml4r6wzBMZ3B5JcGdbWSrHwGat79liRjfIU4Nwl0UDTTNmnwVUJPaUA5CE_D8fHfou85TCPT9Inpkpm10heyGSzAZkBQZhIJztteWbSU6GbbCObgeNbj0xwZJrW86-iq0wrPgtbbyB-k.AT1_Y2LwSTZO";

                const map = new Map ({
                    basemap: "satellite"
                });

                const view = new MapView({
                    map: map,
                    center: [-81.1329, 32.0043],
                    zoom: 11,
                    container: "viewDiv"
                });

                //Adding locate widget per the documentation along with the graphic marker
                const locateWidget = new Locate({
                    view: view,
                    graphic: new Graphic({
                    symbol: { type: "simple-marker" }
                    })
                });
                view.ui.add(locateWidget, "top-right");

                //Adding the search widget from Lab 3 but decided to change the position
                const searchWidget = new Search({
                    view: view
                    });
                // Adds the search widget below other elements in the top left corner of the view
                view.ui.add(searchWidget, {
                position: "top-right",
                });



            });
        </script>
    </head>
    <body>
        <h1>Hello. This is GEOG 576 Lab 4.</h1>
        <div id="viewDiv"></div>
    </body>
</html>
